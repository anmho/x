name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  platform:
    name: Platform Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/agent-control-api/go.mod

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Platform Verify
        run: ./scripts/verify platform

  apps:
    name: App Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
      - name: Run App Verify
        run: ./scripts/verify apps

  docs:
    name: Docs Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Verify Mintlify Tooling
        run: ./scripts/verify docs
