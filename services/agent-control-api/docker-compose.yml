services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_control
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/agent_control?sslmode=disable
      PORT: "8090"
      # Set CLOUD_RUN_JOB_NAME to dispatch to Cloud Run instead of running claude locally.
      # CLOUD_RUN_JOB_NAME: projects/my-project/locations/us-central1/jobs/agent-runner
      # ANTHROPIC_API_KEY is required if running agent-runner container locally.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8090:8090"
    volumes:
      # Mount claude credentials from host so local runner can authenticate
      - "${HOME}/.claude:/root/.claude:ro"
